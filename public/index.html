<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Medical First-Response</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header>
            <div class="logo-wrapper">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-activity pulse"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            </div>
            <h1>Medical Triage AI</h1>
            <p>Immediate guidance for medical situations.</p>
        </header>

        <section class="input-section glass-panel">
            <label for="symptoms">Describe the symptoms in detail:</label>
            <textarea id="symptoms" placeholder="E.g., I'm having severe chest pain radiating to my left arm, and I feel lightheaded..."></textarea>
            
            <button id="analyze-btn">
                <span class="btn-text">Analyze Symptoms</span>
                <span class="loader hidden"></span>
            </button>
            <p class="disclaimer"><strong>Disclaimer:</strong> This is NOT a diagnostic tool and does NOT replace professional medical advice. Call 112 or 108 immediately in a medical emergency.</p>
        </section>

        <section id="result-section" class="result-section hidden">
            <div class="glass-panel risk-card">
                <div class="risk-header">
                    <h2>Risk Level</h2>
                    <span id="risk-badge" class="badge"></span>
                </div>
                <p id="summary-text" class="summary"></p>
            </div>

            <div class="recommendations-grid">
                <div class="glass-panel action-card">
                    <div class="card-icon action-icon">🚨</div>
                    <h3>Immediate Actions</h3>
                    <ul id="immediate-actions-list"></ul>
                </div>
                <div class="glass-panel avoid-card">
                    <div class="card-icon avoid-icon">⛔</div>
                    <h3>What to Avoid</h3>
                    <ul id="avoid-list"></ul>
                </div>
            </div>

            <div class="glass-panel next-steps-card">
                <div class="card-icon next-icon">➡️</div>
                <h3>Next Steps</h3>
                <ul id="next-steps-list"></ul>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
